name: ✨ Feature Request
description: 새로운 기능이나 개선을 제안합니다
title: 'feat: '
labels: ['enhancement', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        제안 감사합니다. **해결하려는 문제**를 먼저 설명하고, 해법은 그다음에 제시해 주세요.

  - type: textarea
    id: problem
    attributes:
      label: 어떤 문제를 해결하고자 하나요?
      description: 사용자 입장의 시나리오로 설명해 주세요.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 해법
      description: API · CLI · 설정 등 구체적이면 좋습니다.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 검토한 대안
      description: 다른 접근을 검토했다면 어떤 것이고, 왜 본 제안이 더 나은가요?

  - type: textarea
    id: context
    attributes:
      label: 추가 맥락
      description: 사용자 인용, 관련 이슈, 외부 링크 등.

  - type: checkboxes
    id: terms
    attributes:
      label: 확인
      options:
        - label: 동일/유사 제안이 없는지 검색했습니다
          required: true
        - label: 이것이 핵심 범위(§1 제품 포지셔닝)에 부합한다고 생각합니다
          required: false
